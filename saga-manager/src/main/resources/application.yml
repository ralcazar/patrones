spring:
  application:
    name: saga-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/saga_manager
    username: saga_manager
    password: saga_manager
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: saga-manager
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: MANUAL

saga-manager:
  kafka:
    # Topic de entrada con los disparos de saga (id_app, id_externo, payload).
    topic: saga-manager.trigger

  legacy-poller:
    enabled: true
    # Intervalo entre sondeos de la tabla legacy (ms).
    fixed-delay-ms: 5000
    # Tamaño de página de filas reclamadas por sondeo.
    page-size: 20
    # Duración del lease antes de que una fila 'PROCESANDO' vuelva a ser elegible (segundos).
    lease-seconds: 30
    # Estado final tras procesar correctamente una fila.
    success-status: PROCESADO
    # Estado final tras agotar reintentos (no implementado en este alcance: se deja en PROCESANDO
    # para que el lease caduque y se reintente).

  clients:
    first-service:
      base-url: http://localhost:8081/first-service
    second-service:
      base-url: http://localhost:8082/second-service
    third-service:
      base-url: http://localhost:8083/third-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
