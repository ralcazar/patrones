# --- Parámetros de la orden (agregado OrdenRoot: ejecución + saga) ---
orden:
  # Lease del token de ejecución: holgadamente mayor que el timeout REST más
  # largo de UN paso (se renueva en la tx de cada paso completado, no
  # necesita cubrir la saga entera).
  lease: PT10M
  planificador:
    intervalo-ms: 500   # cada cuánto el planificador de este pod busca candidatas
    limite: 50           # nº máximo de órdenes candidatas por pasada
    tamano-pool: 4        # pool de hilos compartido por los @Scheduled del módulo

ordermanager:
  topics:
    # Único uso de Kafka: la respuesta (diferida, puede tardar horas) de la saga secundaria 2
    respuesta-secundaria2: respuesta.secundaria2
  limpieza:
    cron: "0 0 3 * * *"   # cada noche a las 03:00
    retencion-dias: 30    # solo se purga lo finalizado-bien más viejo que esto
  tickets:
    cron: "0 0 8-17/3 * * *"   # cada 3h en horario de soporte

spring:
  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/tu_servicio   # AJUSTA
    username: tu_usuario                                  # AJUSTA
    password: tu_password                                 # AJUSTA
    hikari:
      maximum-pool-size: 15   # >= orden.planificador.tamano-pool + margen

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

  flyway:
    enabled: true
